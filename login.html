<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In — LifeCoach AI</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(168,85,247,0.12),transparent); }
    .auth-container { display:flex; width:100%; max-width:880px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:28px; overflow:hidden; }
    .auth-left { flex:1; background:linear-gradient(135deg,rgba(168,85,247,0.15),rgba(99,102,241,0.1)); border-right:1px solid rgba(255,255,255,0.06); padding:48px 40px; display:flex; flex-direction:column; justify-content:center; gap:24px; }
    .auth-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .auth-logo-icon { font-size:28px; }
    .auth-logo-text { font-size:20px; font-weight:800; color:#fff; }
    .auth-logo-ai { color:#a855f7; }
    .auth-left h2 { font-size:26px; font-weight:800; line-height:1.3; }
    .auth-left p { color:rgba(255,255,255,0.5); font-size:15px; line-height:1.7; }
    .welcome-card { background:rgba(168,85,247,0.08); border:1px solid rgba(168,85,247,0.2); border-radius:16px; padding:20px; }
    .welcome-card p { font-size:14px; color:rgba(255,255,255,0.65); line-height:1.6; margin:0; }
    .auth-right { flex:1; padding:48px 40px; display:flex; flex-direction:column; justify-content:center; }
    .auth-right h3 { font-size:26px; font-weight:800; margin-bottom:6px; }
    .auth-sub { color:rgba(255,255,255,0.5); font-size:15px; margin-bottom:28px; }
    .auth-sub a { color:#a855f7; text-decoration:none; font-weight:600; }
    .form-group { margin-bottom:16px; }
    .form-group label { display:flex; justify-content:space-between; align-items:center; font-size:13px; font-weight:600; color:rgba(255,255,255,0.7); margin-bottom:7px; }
    .form-group label a { color:#a855f7; text-decoration:none; font-weight:500; font-size:12px; }
    .form-group input { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:13px 16px; color:#fff; font-size:15px; font-family:'Inter',sans-serif; transition:all 0.2s; outline:none; }
    .form-group input:focus { border-color:rgba(168,85,247,0.5); background:rgba(168,85,247,0.05); box-shadow:0 0 0 3px rgba(168,85,247,0.1); }
    .form-group input::placeholder { color:rgba(255,255,255,0.25); }
    .password-wrapper { position:relative; }
    .password-toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:rgba(255,255,255,0.35); cursor:pointer; font-size:15px; }
    .remember-row { display:flex; align-items:center; gap:8px; margin-bottom:20px; font-size:13px; color:rgba(255,255,255,0.5); }
    .remember-row input { accent-color:#a855f7; width:15px; height:15px; }
    .btn-auth { width:100%; background:linear-gradient(135deg,#a855f7,#6366f1); color:#fff; border:none; padding:15px; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 0 30px rgba(168,85,247,0.25); }
    .btn-auth:hover { opacity:0.92; transform:translateY(-1px); }
    .btn-auth:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .error-msg { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); color:#f87171; padding:12px 16px; border-radius:10px; font-size:13px; margin-bottom:14px; display:none; }
    .success-msg { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.25); color:#4ade80; padding:12px 16px; border-radius:10px; font-size:13px; margin-bottom:14px; display:none; text-align:center; }
    @media(max-width:700px){ .auth-left{display:none;} .auth-right{padding:36px 24px;} }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-container">
    <div class="auth-left">
      <a href="index.html" class="auth-logo">
        <span class="auth-logo-icon">🧠</span>
        <span class="auth-logo-text">LifeCoach <span class="auth-logo-ai">AI</span></span>
      </a>
      <div>
        <h2>Welcome Back! 👋</h2>
        <p>Your AI coach has been tracking your progress. Log in to see your insights, habits, and weekly review.</p>
      </div>
      <div class="welcome-card">
        <p>💡 <strong style="color:#c084fc;">Did you know?</strong> People who check in daily with LifeCoach AI are <strong style="color:#c084fc;">3x more likely</strong> to achieve their goals within 90 days.</p>
      </div>
    </div>
    <div class="auth-right">
      <h3>Log In</h3>
      <p class="auth-sub">Don't have an account? <a href="signup.html">Sign up free</a></p>
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="rahul@gmail.com"/>
      </div>
      <div class="form-group">
        <label>Password <a href="#">Forgot password?</a></label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter your password"/>
          <button class="password-toggle" onclick="togglePwd()" type="button"><i class="fas fa-eye" id="eyeIcon"></i></button>
        </div>
      </div>
      <label class="remember-row"><input type="checkbox" id="rememberMe"/> Remember me for 30 days</label>
      <button class="btn-auth" id="loginBtn" onclick="handleLogin()"><i class="fas fa-sign-in-alt"></i> Log In</button>
    </div>
  </div>
</div>
<script>
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    if(el) { el.textContent = msg; el.style.display = 'block'; }
    const successEl = document.getElementById('successMsg');
    if(successEl) successEl.style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    if(el) { el.textContent = msg; el.style.display = 'block'; }
    const errorEl = document.getElementById('errorMsg');
    if(errorEl) errorEl.style.display = 'none';
  }

  async function handleLogin() {
    console.log("--- Login Process Initiated ---");
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      return showError('Please fill in all fields.');
    }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

    try {
      console.log("Sending credentials to backend API...");
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      console.log("Response payload received from server:", data);

      if (!res.ok || data.error) {
        showError(data.error || 'Invalid login credentials.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Log In';
        return;
      }

      // Safeguard validation checks
      if (!data.session || !data.user) {
        console.error("CRITICAL error: The server responded with success but did not include session tokens.");
        showError('Session creation failed. Please try again.');
        btn.disabled = false;
        return;
      }

      console.log("Writing session tokens directly to localStorage...");
      
      // Clear memory cleanly first
      localStorage.clear();
      
      // Save data string objects explicitly
      localStorage.setItem('lc_session', JSON.stringify(data.session));
      localStorage.setItem('lc_user', JSON.stringify(data.user));

      // Immediate verification test loop check
      const verifiedSession = localStorage.getItem('lc_session');
      console.log("Immediate Verification Test — Is local storage null now?:", verifiedSession === null);

      showSuccess('✅ Authenticated successfully! Redirecting...');
      
      setTimeout(() => {
        console.log("Executing relative page redirect to dashboard.html...");
        window.location.replace('dashboard.html');
      }, 1200);

    } catch (err) {
      console.error("Network connection failure during request flow:", err);
      showError('Connection error. Is your server port active?');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Log In';
    }
  }
</script>
</body>
</html>
